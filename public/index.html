<!DOCTYPE html>
<html>
<head>

<title>Rise of Ikons</title>

<style>

body{
margin:0;
overflow:hidden;
background:#0f172a;
font-family:Arial;
color:white;
}

#menu{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

#shopBtn{
position:absolute;
top:20px;
right:20px;
padding:10px;
background:gold;
border:none;
display:none;
}

#coins{
position:absolute;
top:20px;
left:20px;
display:none;
}

#shop{
position:absolute;
top:70px;
right:20px;
background:#1e293b;
padding:15px;
border-radius:10px;
display:none;
}

#minimap{
position:absolute;
bottom:20px;
right:20px;
border:2px solid white;
background:black;
}

canvas{
display:none;
}

button{
padding:8px;
margin:5px;
}

</style>
</head>

<body>

<div id="menu">

<h1>RISE OF IKONS</h1>

<input id="name" placeholder="Username">

<br><br>

<button onclick="startGame()">Play</button>

</div>

<div id="coins">Coins: 0</div>

<button id="shopBtn" onclick="toggleShop()">Shop</button>

<div id="shop">

<h3>Crates</h3>

<button onclick="crate('epic')">Epic</button>
<button onclick="crate('rare')">Rare</button>
<button onclick="crate('legendary')">Legendary</button>

<h3>Skins</h3>

<button onclick="skin('cyan')">Cyan</button>
<button onclick="skin('lime')">Lime</button>
<button onclick="skin('red')">Red</button>

</div>

<canvas id="game"></canvas>
<canvas id="minimap" width="200" height="200"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>

</body>
</html>
