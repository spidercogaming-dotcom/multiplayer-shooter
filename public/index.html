<!DOCTYPE html>
<html>

<head>

<title>Rise of Ikons</title>

<style>

body{
margin:0;
overflow:hidden;
background:#0a0a0a;
font-family:Arial;
color:white;
}

#menu{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

#coins{
position:absolute;
top:20px;
left:20px;
}

#shopBtn{
position:absolute;
top:20px;
right:20px;
}

#shop{
position:absolute;
top:70px;
right:20px;
background:#222;
padding:15px;
border-radius:10px;
display:none;
}

canvas{
display:none;
}

#minimap{
position:absolute;
bottom:20px;
right:20px;
border:2px solid white;
}

</style>

</head>

<body>

<div id="menu">

<h1>RISE OF IKONS</h1>

<input id="username" placeholder="Username">

<br><br>

<button onclick="startGame()">Play</button>

</div>

<div id="coins">Coins: 0</div>

<button id="shopBtn" onclick="toggleShop()">Shop</button>

<div id="shop">

<h3>Epic Crate (50)</h3>
<button onclick="crate('epic')">Open</button>

<h3>Rare Crate (100)</h3>
<button onclick="crate('rare')">Open</button>

<h3>Legendary Crate (200)</h3>
<button onclick="crate('legendary')">Open</button>

<h3>Skins</h3>

<button onclick="skin('cyan')">Cyan</button>
<button onclick="skin('lime')">Lime</button>
<button onclick="skin('red')">Red</button>

</div>

<canvas id="game"></canvas>
<canvas id="minimap" width="200" height="200"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>

</body>

</html>
