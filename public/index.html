<!DOCTYPE html>
<html>
<head>
<title>Rise of Ikons PRO</title>

<style>
body{margin:0;overflow:hidden;background:#111;color:white;font-family:Arial;}

#menu{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

#hud{
position:absolute;
top:10px;
left:10px;
}

#minimap{
position:absolute;
top:10px;
left:10px;
border:2px solid white;
}

#mode{
position:absolute;
top:10px;
right:10px;
}

canvas{display:none;}
</style>
</head>

<body>

<div id="menu">
<h1>RISE OF IKONS PRO</h1>
<input id="name" placeholder="username"><br><br>
<button onclick="start()">Play</button>
</div>

<div id="hud"></div>

<canvas id="minimap" width="200" height="200"></canvas>

<div id="mode">
<button onclick="mode('ffa')">FFA</button>
<button onclick="mode('team')">Team</button>
<button onclick="mode('swords')">Swords</button>
</div>

<canvas id="game"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>

</body>
</html>
